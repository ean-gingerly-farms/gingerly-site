<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ==========================================================================
   DESIGN TOKENS — Gingerly Farms
   Single source of truth for all design decisions.
   Change values here; everything downstream inherits automatically.
   ========================================================================== */

:root {
  /* ---------- Brand Colors ---------- */
  --color-ocean:        #3A5C6F;   /* Ocean Harbor Blue — primary brand anchor */
  --color-deep:         #2B4759;   /* Deep Coastal Blue — dark contrast, nav, footer */
  --color-sage:         #7FAE9B;   /* Coastal Sage — secondary botanical tone */
  --color-coral:        #FF6A5C;   /* Electric Coral — accent, hover states, CTA highlights */
  --color-oyster:       #D9D7D2;   /* Oyster — neutral, section separation */
  --color-white:        #F5F3EE;   /* Coastal White — primary background */

  /* ---------- Semantic Color Aliases ---------- */
  --bg-primary:         var(--color-white);
  --bg-surface:         var(--color-oyster);
  --bg-dark:            var(--color-deep);
  --bg-ocean:           var(--color-ocean);
  --bg-sage:            var(--color-sage);

  --text-heading:       var(--color-deep);
  --text-body:          #3D4F54;
  --text-muted:         #6B7D82;
  --text-on-dark:       var(--color-white);
  --text-on-ocean:      var(--color-white);

  --link-color:         var(--color-ocean);
  --link-hover:         var(--color-coral);

  --btn-primary-bg:     var(--color-ocean);
  --btn-primary-text:   var(--color-white);
  --btn-primary-hover:  var(--color-coral);
  --btn-ghost-text:     var(--color-ocean);
  --btn-ghost-border:   var(--color-ocean);
  --btn-ghost-hover-bg: var(--color-ocean);
  --btn-ghost-hover-text: var(--color-white);

  --border-light:       rgba(43, 71, 89, 0.1);
  --border-medium:      rgba(43, 71, 89, 0.2);

  /* ---------- Typography ---------- */
  --font-heading:       'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body:          'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono:          'JetBrains Mono', 'Fira Code', monospace;

  /* Type scale — fluid with clamp() */
  --text-xs:            clamp(0.7rem, 0.65rem + 0.25vw, 0.75rem);     /* ~12px */
  --text-sm:            clamp(0.8rem, 0.75rem + 0.25vw, 0.875rem);    /* ~14px */
  --text-base:          clamp(0.95rem, 0.9rem + 0.25vw, 1.0625rem);   /* ~16-17px */
  --text-md:            clamp(1.05rem, 1rem + 0.25vw, 1.1875rem);     /* ~18-19px */
  --text-lg:            clamp(1.2rem, 1.1rem + 0.5vw, 1.375rem);      /* ~20-22px */
  --text-xl:            clamp(1.4rem, 1.2rem + 1vw, 1.75rem);         /* ~24-28px */
  --text-2xl:           clamp(1.75rem, 1.5rem + 1.25vw, 2.25rem);     /* ~30-36px */
  --text-3xl:           clamp(2rem, 1.7rem + 1.5vw, 2.75rem);         /* ~34-44px */
  --text-hero:          clamp(2.5rem, 2rem + 2.5vw, 3.75rem);         /* ~42-60px */

  --leading-tight:      1.15;
  --leading-snug:       1.3;
  --leading-normal:     1.6;
  --leading-relaxed:    1.75;

  --tracking-tight:     -0.02em;
  --tracking-normal:    0;
  --tracking-wide:      0.05em;
  --tracking-wider:     0.1em;
  --tracking-nav:       0.12em;

  --weight-regular:     400;
  --weight-medium:      500;
  --weight-semibold:    600;
  --weight-bold:        700;

  /* ---------- Spacing (8-point grid) ---------- */
  --space-1:            0.25rem;   /*  4px */
  --space-2:            0.5rem;    /*  8px */
  --space-3:            0.75rem;   /* 12px */
  --space-4:            1rem;      /* 16px */
  --space-5:            1.25rem;   /* 20px */
  --space-6:            1.5rem;    /* 24px */
  --space-8:            2rem;      /* 32px */
  --space-10:           2.5rem;    /* 40px */
  --space-12:           3rem;      /* 48px */
  --space-16:           4rem;      /* 64px */
  --space-20:           5rem;      /* 80px */
  --space-24:           6rem;      /* 96px */
  --space-32:           8rem;      /* 128px */

  /* ---------- Layout ---------- */
  --max-width:          1200px;
  --max-width-wide:     1400px;
  --max-width-narrow:   768px;
  --max-width-prose:    68ch;
  --nav-height:         72px;
  --nav-height-mobile:  60px;

  /* ---------- Elevation ---------- */
  --shadow-xs:          0 1px 2px rgba(43, 71, 89, 0.05);
  --shadow-sm:          0 2px 8px rgba(43, 71, 89, 0.08);
  --shadow-md:          0 4px 16px rgba(43, 71, 89, 0.1);
  --shadow-lg:          0 8px 32px rgba(43, 71, 89, 0.12);

  /* ---------- Border Radius ---------- */
  --radius-sm:          4px;
  --radius-md:          8px;
  --radius-lg:          12px;
  --radius-pill:        999px;

  /* ---------- Transitions ---------- */
  --ease-fast:          150ms ease;
  --ease-base:          250ms ease;
  --ease-slow:          400ms ease;

  /* ---------- Z-Index Stack ---------- */
  --z-base:             0;
  --z-dropdown:         100;
  --z-sticky:           200;
  --z-nav:              300;
  --z-overlay:          400;
  --z-toast:            500;
}

/* ==========================================================================
   TYPOGRAPHY — Gingerly Farms
   Base reset, heading hierarchy, fluid type, utility classes.
   Depends on: tokens.css
   ========================================================================== */

/* ---------- Fonts ----------
   Loaded via Google Fonts <link> in HTML <head>.
   To self-host later: download WOFF2 files, place in /assets/fonts/,
   and replace the <link> tags with @font-face declarations here.
   ---------- */

/* ---------- Base Reset ---------- */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 100%;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
  scroll-padding-top: var(--nav-height);
}

body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--leading-normal);
  color: var(--text-body);
  background-color: var(--bg-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---------- Heading Hierarchy ---------- */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  color: var(--text-heading);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
  font-weight: var(--weight-bold);
}

h1 {
  font-size: var(--text-hero);
  font-weight: var(--weight-bold);
}

h2 {
  font-size: var(--text-3xl);
}

h3 {
  font-size: var(--text-2xl);
}

h4 {
  font-size: var(--text-xl);
}

h5 {
  font-size: var(--text-lg);
}

h6 {
  font-size: var(--text-md);
}

/* ---------- Paragraph ---------- */
p {
  max-width: var(--max-width-prose);
  margin-bottom: var(--space-4);
}

p:last-child {
  margin-bottom: 0;
}

/* ---------- Links ---------- */
a {
  color: var(--link-color);
  text-decoration: none;
  transition: color var(--ease-fast);
}

a:hover {
  color: var(--link-hover);
}

a:focus-visible {
  outline: 2px solid var(--color-coral);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ---------- Lists ---------- */
ul, ol {
  padding-left: var(--space-6);
  margin-bottom: var(--space-4);
}

li {
  margin-bottom: var(--space-2);
}

/* ---------- Media ---------- */
img, picture, video, canvas, svg {
  display: block;
  max-width: 100%;
}

/* ---------- Utility Classes ---------- */

/* Eyebrow / label — all-caps micro text */
.eyebrow,
.label {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-nav);
  text-transform: uppercase;
  color: var(--color-sage);
}

.eyebrow--coral {
  color: var(--color-coral);
}

/* Lead paragraph — large intro text */
.text-lead {
  font-size: var(--text-lg);
  line-height: var(--leading-relaxed);
  color: var(--text-body);
  max-width: var(--max-width-prose);
}

/* Section title with underline accent */
.section-title {
  margin-bottom: var(--space-4);
}

.section-title.has-rule::after {
  content: '';
  display: block;
  width: 48px;
  height: 3px;
  background-color: var(--color-coral);
  margin-top: var(--space-3);
  border-radius: var(--radius-pill);
}

/* Small / muted text */
.text-small {
  font-size: var(--text-sm);
}

.text-muted {
  color: var(--text-muted);
}

/* Dark background text inversion */
.on-dark {
  color: var(--text-on-dark);
}

.on-dark h1,
.on-dark h2,
.on-dark h3,
.on-dark h4,
.on-dark h5,
.on-dark h6 {
  color: var(--text-on-dark);
}

.on-dark p,
.on-dark .text-lead {
  color: rgba(245, 243, 238, 0.85);
}

.on-dark .eyebrow,
.on-dark .label {
  color: var(--color-sage);
}

/* Horizontal rule */
.rule-coral {
  border: none;
  height: 2px;
  background-color: var(--color-coral);
  width: 48px;
  border-radius: var(--radius-pill);
}

/* Accessibility */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.skip-link {
  position: absolute;
  top: -100%;
  left: var(--space-4);
  background: var(--color-deep);
  color: var(--text-on-dark);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-sm);
  z-index: var(--z-toast);
  font-size: var(--text-sm);
}

.skip-link:focus {
  top: var(--space-2);
}

/* ==========================================================================
   BUTTONS — Gingerly Farms
   Primary + Ghost two-tier system. Harbor Blue base, Coral hover.
   Depends on: tokens.css
   ========================================================================== */

/* ---------- Base Button ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  text-decoration: none;
  border: 2px solid transparent;
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-6);
  cursor: pointer;
  transition: all var(--ease-base);
  line-height: 1;
  white-space: nowrap;
}

.btn:focus-visible {
  outline: 2px solid var(--color-coral);
  outline-offset: 2px;
}

/* ---------- Primary ---------- */
.btn-primary {
  background-color: var(--btn-primary-bg);
  color: var(--btn-primary-text);
  border-color: var(--btn-primary-bg);
}

.btn-primary:hover {
  background-color: var(--btn-primary-hover);
  border-color: var(--btn-primary-hover);
  color: var(--color-white);
}

/* ---------- Ghost ---------- */
.btn-ghost {
  background-color: transparent;
  color: var(--btn-ghost-text);
  border-color: var(--btn-ghost-border);
}

.btn-ghost:hover {
  background-color: var(--btn-ghost-hover-bg);
  color: var(--btn-ghost-hover-text);
}

/* Ghost on dark backgrounds */
.on-dark .btn-ghost {
  color: var(--color-white);
  border-color: rgba(245, 243, 238, 0.4);
}

.on-dark .btn-ghost:hover {
  background-color: var(--color-white);
  color: var(--color-deep);
  border-color: var(--color-white);
}

/* ---------- Size Variants ---------- */
.btn--sm {
  font-size: var(--text-xs);
  padding: var(--space-2) var(--space-4);
}

.btn--lg {
  font-size: var(--text-base);
  padding: var(--space-4) var(--space-8);
}

.btn--full {
  width: 100%;
}

/* ---------- Button Arrow ---------- */
.btn-arrow::after {
  content: '\2192';
  transition: transform var(--ease-fast);
  display: inline-block;
}

.btn-arrow:hover::after {
  transform: translateX(4px);
}

/* ---------- Button Group ---------- */
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-4);
  align-items: center;
}

/* ---------- Icon Button (hamburger, close) ---------- */
.btn-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  padding: var(--space-2);
  cursor: pointer;
  color: inherit;
  transition: color var(--ease-fast);
}

.btn-icon:hover {
  color: var(--color-coral);
}

.btn-icon:focus-visible {
  outline: 2px solid var(--color-coral);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ==========================================================================
   LAYOUT — Gingerly Farms
   Section/container system, grids, cards, and layout primitives.
   Depends on: tokens.css
   ========================================================================== */

/* ---------- Section System ---------- */
.section {
  padding: var(--space-20) 0;
}

.section--sm {
  padding: var(--space-12) 0;
}

.section--lg {
  padding: var(--space-24) 0;
}

.section--hero {
  padding: var(--space-24) 0 var(--space-20);
  min-height: 60vh;
  display: flex;
  align-items: center;
}

/* Section background variants */
.section--white {
  background-color: var(--color-white);
}

.section--surface {
  background-color: var(--bg-surface);
}

.section--ocean {
  background-color: var(--bg-ocean);
}

.section--dark {
  background-color: var(--bg-dark);
}

.section--sage {
  background-color: var(--bg-sage);
}

/* ---------- Container System ---------- */
.container {
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 var(--space-6);
}

.container--wide {
  max-width: var(--max-width-wide);
}

.container--narrow {
  max-width: var(--max-width-narrow);
}

/* ---------- Grid Helpers ---------- */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-8);
}

.grid-2--asymmetric {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: var(--space-10);
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-8);
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-6);
}

/* ---------- Flex Utilities ---------- */
.flex {
  display: flex;
}

.flex-col {
  flex-direction: column;
}

.flex-center {
  align-items: center;
  justify-content: center;
}

.flex-between {
  justify-content: space-between;
}

.gap-4 {
  gap: var(--space-4);
}

.gap-6 {
  gap: var(--space-6);
}

.gap-8 {
  gap: var(--space-8);
}

/* ---------- Text Alignment ---------- */
.text-center {
  text-align: center;
}

.text-center p,
.text-center .text-lead {
  margin-left: auto;
  margin-right: auto;
}

/* ---------- Card Component ---------- */
.card {
  background-color: var(--color-white);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: var(--space-8);
  transition: box-shadow var(--ease-base), transform var(--ease-base);
}

.card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.card--surface {
  background-color: var(--bg-surface);
  border-color: transparent;
}

.card--flat {
  border: none;
  box-shadow: none;
}

.card--flat:hover {
  box-shadow: none;
  transform: none;
}

/* Card with image placeholder */
.card__image {
  width: 100%;
  aspect-ratio: 4 / 3;
  background-color: var(--bg-surface);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-6);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card__image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Image placeholder icon */
.card__image-placeholder {
  color: var(--color-oyster);
  opacity: 0.5;
}

.card__eyebrow {
  margin-bottom: var(--space-2);
}

.card__title {
  font-family: var(--font-heading);
  font-size: var(--text-xl);
  color: var(--text-heading);
  margin-bottom: var(--space-3);
}

.card__body {
  font-size: var(--text-base);
  color: var(--text-body);
  margin-bottom: var(--space-6);
}

.card__body:last-child {
  margin-bottom: 0;
}

/* ---------- Product Card ---------- */
.product-card {
  text-align: center;
}

.product-card .card__image {
  aspect-ratio: 1 / 1;
  border-radius: var(--radius-lg);
  background-color: var(--bg-surface);
}

/* ---------- Location Card ---------- */
.location-card {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.location-card__name {
  font-family: var(--font-heading);
  font-size: var(--text-lg);
  color: var(--text-heading);
  font-weight: var(--weight-semibold);
}

.location-card__details {
  font-size: var(--text-sm);
  color: var(--text-muted);
  line-height: var(--leading-relaxed);
}

/* ---------- Callout / Quote Block ---------- */
.callout {
  border-left: 3px solid var(--color-coral);
  padding: var(--space-6) var(--space-8);
  background-color: rgba(255, 106, 92, 0.04);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
}

.callout p {
  font-size: var(--text-md);
  font-style: italic;
  color: var(--text-heading);
}

/* ---------- Divider ---------- */
.divider {
  border: none;
  height: 1px;
  background-color: var(--border-light);
  margin: var(--space-12) 0;
}

/* ---------- Spacing Utilities ---------- */
.mb-0 { margin-bottom: 0; }
.mb-4 { margin-bottom: var(--space-4); }
.mb-6 { margin-bottom: var(--space-6); }
.mb-8 { margin-bottom: var(--space-8); }
.mb-12 { margin-bottom: var(--space-12); }
.mb-16 { margin-bottom: var(--space-16); }

/* ---------- Image Placeholder ---------- */
.image-placeholder {
  width: 100%;
  background-color: var(--bg-surface);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.image-placeholder--hero {
  aspect-ratio: 16 / 7;
}

.image-placeholder--square {
  aspect-ratio: 1 / 1;
}

.image-placeholder--landscape {
  aspect-ratio: 4 / 3;
}

/* ---------- Inner Page Hero — Side Card Layout ---------- */
/* Two-column hero: text left, image card right */
.hero-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-10);
  align-items: center;
}

.hero-split__text {
  max-width: 540px;
}

.hero-split__card {
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 4 / 3;
}

.hero-split__card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ---------- Responsive ---------- */
@media (max-width: 900px) {
  .grid-2 {
    grid-template-columns: 1fr;
  }

  .grid-2--asymmetric {
    grid-template-columns: 1fr;
  }

  .grid-3 {
    grid-template-columns: 1fr;
  }

  .grid-4 {
    grid-template-columns: 1fr 1fr;
  }

  .hero-split {
    grid-template-columns: 1fr;
    gap: var(--space-8);
  }

  .hero-split__card {
    aspect-ratio: 16 / 9;
  }

  .section--hero {
    min-height: auto;
    padding: var(--space-16) 0 var(--space-12);
  }
}

@media (max-width: 640px) {
  .section {
    padding: var(--space-12) 0;
  }

  .section--lg {
    padding: var(--space-16) 0;
  }

  .grid-4 {
    grid-template-columns: 1fr;
  }

  .container {
    padding: 0 var(--space-4);
  }
}

/* ==========================================================================
   HOME — Gingerly Farms
   Homepage-specific styles. Left-aligned layout.
   Depends on: tokens.css, typography.css, layout.css
   ========================================================================== */

/* ---------- Hero ---------- */
.hero {
  text-align: left;
  padding: var(--space-24) 0 var(--space-20);
  background-color: var(--bg-dark);
  position: relative;
  overflow: hidden;
}

/* Background image layer */
.hero__bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.hero__bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  image-rendering: auto; /* Ensure browser uses best quality scaling */
}

/* Gradient overlay on hero image — dark left for text readability, lighter right to show bridge */
.hero__bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      to right,
      rgba(20, 30, 45, 0.82) 0%,
      rgba(20, 30, 45, 0.60) 30%,
      rgba(20, 30, 45, 0.20) 60%,
      transparent 100%
    ),
    linear-gradient(
      to top,
      rgba(20, 30, 45, 0.30) 0%,
      transparent 40%
    );
}

/* Fallback when no hero image — show geo pattern */
.hero--no-image::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 50%;
  background-image:
    radial-gradient(circle at 70% 30%, rgba(127, 174, 155, 0.25) 0%, transparent 50%),
    radial-gradient(circle at 90% 70%, rgba(58, 92, 111, 0.3) 0%, transparent 40%);
  pointer-events: none;
}

.hero--no-image::after {
  content: '';
  position: absolute;
  top: 10%;
  right: 5%;
  width: 400px;
  height: 400px;
  background:
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(127, 174, 155, 0.15) 20px,
      rgba(127, 174, 155, 0.15) 21px
    );
  border-radius: var(--radius-lg);
  pointer-events: none;
  opacity: 0.8;
}

.hero__content {
  position: relative;
  z-index: 1;
  max-width: 720px;
}

.hero__eyebrow {
  display: inline-block;
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-nav);
  text-transform: uppercase;
  color: var(--color-sage);
  margin-bottom: var(--space-6);
}

.hero__title {
  font-size: var(--text-hero);
  color: var(--text-on-dark);
  margin-bottom: var(--space-6);
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
}

.hero__subtitle {
  font-size: var(--text-lg);
  color: rgba(245, 243, 238, 0.85);
  max-width: 560px;
  margin: 0 0 var(--space-10);
  line-height: var(--leading-relaxed);
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
}

.hero__actions {
  display: flex;
  gap: var(--space-4);
  flex-wrap: wrap;
}

/* ---------- Intro / Brand Statement ---------- */
.intro {
  text-align: left;
}

.intro__heading {
  margin-bottom: var(--space-6);
}

.intro__body {
  font-size: var(--text-md);
  color: var(--text-body);
  max-width: 640px;
  line-height: var(--leading-relaxed);
}

/* ---------- Business Lines Cards ---------- */
.lines-card {
  padding: var(--space-10);
  border-radius: var(--radius-lg);
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  transition: transform var(--ease-base), box-shadow var(--ease-base);
  border: 1px solid var(--border-light);
  background-color: var(--color-white);
}

.lines-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.lines-card__icon {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
}

.lines-card__icon--produce {
  background-color: rgba(127, 174, 155, 0.15);
  color: var(--color-sage);
}

.lines-card__title {
  font-family: var(--font-heading);
  font-size: var(--text-2xl);
  color: var(--text-heading);
}

.lines-card__body {
  font-size: var(--text-base);
  color: var(--text-body);
  line-height: var(--leading-relaxed);
}

.lines-card__link {
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  color: var(--color-ocean);
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  transition: color var(--ease-fast), gap var(--ease-fast);
  margin-top: auto;
}

.lines-card:hover .lines-card__link {
  color: var(--color-coral);
  gap: var(--space-3);
}

/* ---------- How It Works / Process ---------- */
.process-steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-8);
  text-align: left;
}

.process-step {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: var(--space-4);
}

.process-step__number {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background-color: var(--color-sage);
  color: var(--color-white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-size: var(--text-lg);
  font-weight: var(--weight-bold);
}

.process-step__title {
  font-family: var(--font-heading);
  font-size: var(--text-xl);
  color: var(--text-heading);
}

.process-step__body {
  font-size: var(--text-sm);
  color: var(--text-muted);
  max-width: 320px;
  line-height: var(--leading-relaxed);
}

/* ---------- Lifestyle Image Strip ---------- */
.lifestyle-strip {
  padding: 0;
  overflow: hidden;
}

.lifestyle-strip__grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}

.lifestyle-strip__item {
  overflow: hidden;
  aspect-ratio: 3 / 2;
}

.lifestyle-strip__item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
  display: block;
}

.lifestyle-strip__item:hover img {
  transform: scale(1.06);
}

/* ---------- About Teaser ---------- */
.about-teaser {
  text-align: left;
}

.about-teaser--with-image {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-12);
  align-items: center;
}

.about-teaser__text {
  max-width: 560px;
}

.about-teaser__heading {
  margin-bottom: var(--space-4);
}

.about-teaser__body {
  font-size: var(--text-md);
  color: rgba(245, 243, 238, 0.75);
  max-width: 560px;
  margin: 0 0 var(--space-8);
  line-height: var(--leading-relaxed);
}

.about-teaser__photo {
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.about-teaser__photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: var(--radius-lg);
}

/* ---------- Responsive ---------- */
@media (max-width: 900px) {
  .process-steps {
    grid-template-columns: 1fr;
    gap: var(--space-10);
  }

  .about-teaser--with-image {
    grid-template-columns: 1fr;
    gap: var(--space-8);
  }

  .lifestyle-strip__grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 640px) {
  .hero {
    padding: var(--space-16) 0 var(--space-12);
  }
}


body { margin: 0; }
